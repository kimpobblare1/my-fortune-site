<script>
  // 오늘 날짜 표시
  document.getElementById("today-label").textContent = getTodayKoreanLabel();

  // 오늘 날짜 기준 "오늘의 주인공 띠"를 하나 정함 (날짜 시드로 12개 중 하나 고정)
  const todayStr = getTodayString();
  const heroSeed = hashStringToInt(todayStr + "-hero");
  const heroZodiac = ZODIAC_DATA[heroSeed % 12];

  document.getElementById("center-symbol").textContent = heroZodiac.symbol;
  document.getElementById("center-name").textContent = heroZodiac.name;

  // ---- 12지신 원형 휠 그리기 ----
  const wheel = document.getElementById("zodiac-wheel");
  const radius = 130; // px, .zodiac-wheel 크기에 맞춰 조정됨(반응형은 CSS %로 보정)
  ZODIAC_DATA.forEach((z, i) => {
    const angle = (i / 12) * 2 * Math.PI - Math.PI / 2; // 12시 방향부터 시계방향
    const node = document.createElement("a");
    node.href = `#card-${z.key}`;
    node.className = "zodiac-node" + (z.key === heroZodiac.key ? " today" : "");
    node.style.left = `calc(50% + ${Math.cos(angle) * 42}%)`;
    node.style.top = `calc(50% + ${Math.sin(angle) * 42}%)`;
    node.textContent = z.symbol;
    node.title = z.name;
    wheel.appendChild(node);
  });

  // ---- 12띠 카드 렌더링 ----
  const grid = document.getElementById("fortune-grid");
  ZODIAC_DATA.forEach((z) => {
    const fortune = getDailyFortune(z.key, todayStr);
    const isHero = z.key === heroZodiac.key;
    const card = document.createElement("div");
    card.className = "fortune-card" + (isHero ? " today" : "");
    card.id = `card-${z.key}`;
    card.innerHTML = `
      ${isHero ? '<span class="today-badge">오늘의 주인공</span>' : ""}
      <div class="card-head">
        <span class="card-symbol">${z.symbol}</span>
        <div>
          <div class="card-name">${z.name}</div>
          <div class="card-hanja">${z.years}</div>
        </div>
      </div>
      <p>${fortune.overall}</p>
      <p><strong>금전운:</strong> ${fortune.money}</p>
      <p><strong>애정운:</strong> ${fortune.romance}</p>
      <p><strong>학업/업무:</strong> ${fortune.work}</p>
      <p><strong>주의:</strong> ${fortune.caution}</p>
      <div class="lucky-row">
        <span class="lucky-tag">행운숫자 ${fortune.luckyNumber}</span>
        <span class="lucky-tag">행운색 ${fortune.luckyColor}</span>
        <span class="lucky-tag">행운아이템 ${fortune.luckyItem}</span>
      </div>
    `;
    grid.appendChild(card);
  });
</script>
