<script src="assets/js/fortune-data.js"></script>
<script src="assets/js/fortune-logic.js"></script>
<script>
  document.getElementById("today-label").textContent = getTodayKoreanLabel();

  const todayStr = getTodayString();

  const ranked = ZODIAC_DATA.map((z) => {
    const seed = hashStringToInt(`${todayStr}-${z.key}-wealth`);
    const score = (seed % 41) + 60; // 60~100 사이 점수 (재미 위주라 너무 낮은 점수는 배제)
    const comment = pickBySeed(FORTUNE_POOL.money, seed + 3);
    return { ...z, score, comment };
  }).sort((a, b) => b.score - a.score);

  const list = document.getElementById("wealth-rank-list");
  ranked.forEach((z, i) => {
    const rank = i + 1;
    const topClass = rank <= 3 ? `top${rank}` : "";
    const card = document.createElement("div");
    card.className = `wealth-rank-card ${topClass}`;
    card.innerHTML = `
      <div class="wealth-rank-num">${rank}</div>
      <div class="wealth-rank-symbol">${z.symbol}</div>
      <div class="wealth-rank-info">
        <div class="wealth-rank-name">${z.name}</div>
        <div class="wealth-rank-comment">${z.comment}</div>
      </div>
      <div class="wealth-score-wrap">
        <span class="wealth-score-num">${z.score}</span>
        <div class="wealth-score-track">
          <div class="wealth-score-fill" style="width:${z.score}%;"></div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
</script>
