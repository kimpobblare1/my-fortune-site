<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 띠 운세 보기 | 태어난 년도로 확인하는 오늘의 운세</title>
<meta name="description" content="태어난 년도를 입력하면 내 띠를 자동으로 찾아 오늘의 운세, 행운의 숫자와 아이템을 알려드립니다.">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="container">
  <header class="site-header">
    <h1 class="site-title">내 띠 운세 보기</h1>
    <p class="site-subtitle">태어난 년도만 입력하면, 오늘 나에게 맞는 운세를 바로 확인해요</p>
    <span class="today-label" id="today-label"></span>
    <nav class="site-nav">
      <a href="index.html">오늘의 전체 운세</a>
      <a href="saju-fortune.html">내 사주 운세(베타)</a>
      <a href="lotto.html">띠별 로또번호 추천</a>
    </nav>
  </header>

  <div class="input-panel">
    <label for="year-input">태어난 년도(양력)를 입력하세요</label>
    <div class="input-row">
      <input type="number" id="year-input" placeholder="예: 1990" min="1920" max="2026">
      <button id="submit-btn">내 운세 보기</button>
    </div>
    <div class="error-msg" id="error-msg">년도를 올바르게 입력해주세요 (1920~2026)</div>
  </div>

  <div class="result-panel" id="result-panel">
    <div class="result-hero">
      <span class="symbol" id="r-symbol"></span>
      <div class="name" id="r-name"></div>
      <div class="years" id="r-years"></div>
    </div>

    <div class="result-section">
      <span class="section-label">오늘의 총운</span>
      <p id="r-overall"></p>
    </div>
    <div class="result-section">
      <span class="section-label">금전운</span>
      <p id="r-money"></p>
    </div>
    <div class="result-section">
      <span class="section-label">애정운</span>
      <p id="r-romance"></p>
    </div>
    <div class="result-section">
      <span class="section-label">학업 / 업무운</span>
      <p id="r-work"></p>
    </div>
    <div class="result-section">
      <span class="section-label">오늘의 주의사항</span>
      <p id="r-caution"></p>
    </div>
    <div class="result-section">
      <span class="section-label">오늘의 행운</span>
      <div class="lucky-row">
        <span class="lucky-tag" id="r-number"></span>
        <span class="lucky-tag" id="r-color"></span>
        <span class="lucky-tag" id="r-item"></span>
        <span class="lucky-tag" id="r-direction"></span>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 오늘의 12띠 운세. 본 콘텐츠는 재미로 즐기는 오락 정보입니다.
  </footer>
</div>

<script src="assets/js/fortune-data.js"></script>
<script src="assets/js/fortune-logic.js"></script>
<script>
  document.getElementById("today-label").textContent = getTodayKoreanLabel();

  const yearInput = document.getElementById("year-input");
  const errorMsg = document.getElementById("error-msg");
  const resultPanel = document.getElementById("result-panel");

  function showResult(year) {
    const zodiac = getZodiacByYear(year);
    const fortune = getDailyFortune(zodiac.key, getTodayString());

    document.getElementById("r-symbol").textContent = zodiac.symbol;
    document.getElementById("r-name").textContent = `${year}년생 · ${zodiac.name}`;
    document.getElementById("r-years").textContent = `${zodiac.hanja} · 같은 띠 년도: ${zodiac.years}`;

    document.getElementById("r-overall").textContent = fortune.overall;
    document.getElementById("r-money").textContent = fortune.money;
    document.getElementById("r-romance").textContent = fortune.romance;
    document.getElementById("r-work").textContent = fortune.work;
    document.getElementById("r-caution").textContent = fortune.caution;

    document.getElementById("r-number").textContent = `행운숫자 ${fortune.luckyNumber}`;
    document.getElementById("r-color").textContent = `행운색 ${fortune.luckyColor}`;
    document.getElementById("r-item").textContent = `행운아이템 ${fortune.luckyItem}`;
    document.getElementById("r-direction").textContent = `행운방향 ${fortune.luckyDirection}`;

    resultPanel.classList.add("show");
  }

  function handleSubmit() {
    const year = parseInt(yearInput.value, 10);
    if (!year || year < 1920 || year > 2026) {
      errorMsg.classList.add("show");
      resultPanel.classList.remove("show");
      return;
    }
    errorMsg.classList.remove("show");
    showResult(year);

    // URL에 년도를 남겨서 공유 시에도 같은 결과가 열리도록 함 + 검색엔진 색인용
    const url = new URL(window.location);
    url.searchParams.set("year", year);
    window.history.replaceState({}, "", url);
  }

  document.getElementById("submit-btn").addEventListener("click", handleSubmit);
  yearInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleSubmit();
  });

  // URL에 ?year=1990 같은 값이 있으면 자동으로 결과를 보여줌
  const params = new URLSearchParams(window.location.search);
  const paramYear = parseInt(params.get("year"), 10);
  if (paramYear) {
    yearInput.value = paramYear;
    showResult(paramYear);
  }
</script>
</body>
</html>
