<script src="assets/js/fortune-data.js"></script>

<script>
  document.getElementById("today-label").textContent = getTodayKoreanLabel();

  // 이번 주 월~토 범위를 라벨로 표시
  const monday = getMondayOfWeek(new Date());
  const saturday = new Date(monday);
  saturday.setDate(saturday.getDate() + 5);
  const fmt = (d) => `${d.getMonth() + 1}.${d.getDate()}`;
  document.getElementById("week-label").textContent =
    `이번 주 ${fmt(monday)}(월) ~ ${fmt(saturday)}(토·추첨일) 기준 조합입니다`;

  // 로또볼 색상 클래스 (실제 로또 색 구간과 동일하게: 1-10 노랑, 11-20 파랑, 21-30 빨강, 31-40 회색, 41-45 초록)
  function ballClass(n) {
    if (n <= 10) return "";
    if (n <= 20) return "n3";
    if (n <= 30) return "n4";
    if (n <= 40) return "n5";
    return "n2";
  }

  const grid = document.getElementById("lotto-grid");
  ZODIAC_DATA.forEach((z) => {
    const numbers = getWeeklyLottoNumbers(z.key, new Date());
    const ballsHtml = numbers
      .map((n) => `<span class="lotto-ball ${ballClass(n)}">${n}</span>`)
      .join("");

    const card = document.createElement("div");
    card.className = "fortune-card";
    card.innerHTML = `
      <div class="card-head">
        <span class="card-symbol">${z.symbol}</span>
        <div>
          <div class="card-name">${z.name}</div>
          <div class="card-hanja">${z.hanja}</div>
        </div>
      </div>
      <div class="lotto-ball-row">${ballsHtml}</div>
    `;
    grid.appendChild(card);
  });
</script>
